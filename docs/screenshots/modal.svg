<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" width="1100" height="700">
  <defs>
    <pattern id="dots" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#1f1f1f"/>
    </pattern>
  </defs>
  <!-- Faux desktop background -->
  <rect width="1100" height="700" fill="#1a1a1a"/>
  <rect width="1100" height="700" fill="url(#dots)"/>

  <!-- Overlay dim with dot pattern -->
  <rect width="1100" height="700" fill="rgba(0,0,0,0.78)"/>
  <pattern id="overlayDots" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
    <circle cx="3" cy="3" r="1" fill="rgba(60,60,60,0.7)"/>
  </pattern>
  <rect width="1100" height="700" fill="url(#overlayDots)"/>

  <!-- Modal card -->
  <g transform="translate(310 130)">
    <rect width="480" height="440" fill="rgba(10,10,10,0.92)" stroke="#333333"/>

    <!-- progress bar (red, top) -->
    <rect width="480" height="3" fill="#ff0000"/>

    <!-- Top tag (left) with blinking red dot -->
    <circle cx="29" cy="38" r="3" fill="#ff0000"/>
    <text x="40" y="42" font-family="JetBrains Mono, Consolas, monospace" font-size="10" fill="#888888"
          letter-spacing="2.4">SYS · BREAK</text>

    <!-- Top corner (right) -->
    <text x="458" y="42" font-family="JetBrains Mono, Consolas, monospace" font-size="10" fill="#888888"
          letter-spacing="2.4" text-anchor="end">[ PAUSELY ]</text>

    <!-- Icon -->
    <rect x="202" y="84" width="76" height="76" fill="#000000" stroke="#333333"/>
    <text x="240" y="135" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="36" fill="#ffffff" text-anchor="middle">◐</text>

    <!-- Title -->
    <text x="240" y="206" font-family="JetBrains Mono, Consolas, monospace" font-size="22" font-weight="600"
          fill="#ffffff" letter-spacing="1.2" text-anchor="middle">TIME FOR A BREAK</text>

    <!-- Body -->
    <text x="240" y="246" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="#888888"
          text-anchor="middle">Stand up, stretch, and look at something</text>
    <text x="240" y="266" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="#888888"
          text-anchor="middle">far away for a moment.</text>

    <!-- Buttons -->
    <rect x="79"  y="316" width="150" height="40" fill="none" stroke="#ff0000"/>
    <text x="154" y="341" font-family="JetBrains Mono, Consolas, monospace" font-size="11" fill="#ff0000"
          letter-spacing="2.5" text-anchor="middle">↺ RESTART TIMER</text>

    <rect x="251" y="316" width="150" height="40" fill="none" stroke="#333333"/>
    <text x="326" y="341" font-family="JetBrains Mono, Consolas, monospace" font-size="11" fill="#888888"
          letter-spacing="2.5" text-anchor="middle">⟲ CLOSE (3)</text>
  </g>
</svg>