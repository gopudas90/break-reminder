<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360">
  <defs>
    <pattern id="dots" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#1f1f1f"/>
    </pattern>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="360" fill="#000"/>
  <rect width="1200" height="360" fill="url(#dots)"/>
  <rect width="1200" height="360" fill="url(#fade)"/>

  <!-- Pause icon: orange-to-amber gradient rounded square with two white bars -->
  <defs>
    <linearGradient id="iconG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ff7c3a"/>
      <stop offset="100%" stop-color="#e85d04"/>
    </linearGradient>
  </defs>
  <g transform="translate(140 90)">
    <rect width="180" height="180" rx="36" fill="url(#iconG)"/>
    <rect x="60"  y="48" width="22" height="84" rx="3" fill="#fff"/>
    <rect x="98"  y="48" width="22" height="84" rx="3" fill="#fff"/>
  </g>

  <!-- Wordmark -->
  <text x="370" y="178"
        font-family="JetBrains Mono, Consolas, monospace"
        font-size="72"
        font-weight="700"
        fill="#fff"
        letter-spacing="-2">PAUSELY</text>

  <!-- Tagline (mono uppercase) -->
  <text x="372" y="218"
        font-family="JetBrains Mono, Consolas, monospace"
        font-size="14"
        fill="#888"
        letter-spacing="3">// GENTLE REMINDERS · BREAKS · WATER · SCREEN TIME</text>

  <!-- Red dot + status -->
  <circle cx="380" cy="260" r="5" fill="#ff0000"/>
  <text x="394" y="265"
        font-family="JetBrains Mono, Consolas, monospace"
        font-size="11"
        fill="#888"
        letter-spacing="2.4">SYS · ONLINE · v1.1.0</text>

  <!-- Right corner ID -->
  <text x="1080" y="60"
        font-family="JetBrains Mono, Consolas, monospace"
        font-size="11"
        fill="#555"
        letter-spacing="2.4"
        text-anchor="end">[ A WIN32 UTILITY ]</text>

  <!-- Bottom border line -->
  <line x1="0" y1="340" x2="1200" y2="340" stroke="#222" stroke-width="1"/>
  <text x="600" y="332"
        font-family="JetBrains Mono, Consolas, monospace"
        font-size="9"
        fill="#444"
        letter-spacing="3"
        text-anchor="middle">MADE WITH ♥ BY GOPU · DESIGN INSPIRED BY NOTHING</text>
</svg>
