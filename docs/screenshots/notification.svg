<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 410 200" width="410" height="200">
  <defs>
    <pattern id="dots" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#1f1f1f"/>
    </pattern>
  </defs>
  <rect width="410" height="200" fill="#0a0a0a"/>

  <!-- Two stacked notifications -->
  <g transform="translate(8 12)">
    <rect width="380" height="78" fill="#0d0d0d" stroke="#333333"/>
    <rect width="380" height="2" fill="#ff0000"/>
    <!-- subtle dot pattern inside card -->
    <rect width="380" height="78" fill="url(#dots)" opacity="0.5"/>

    <rect x="13" y="15" width="34" height="34" fill="#000000" stroke="#333333"/>
    <text x="30" y="38" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">◐</text>

    <text x="60" y="32" font-family="JetBrains Mono, Consolas, monospace" font-size="11" fill="#ffffff"
          font-weight="500" letter-spacing="2.2">1 MIN TO BREAK</text>
    <text x="60" y="52" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#888888">Your break is coming up in 1 minute.</text>

    <rect x="346" y="13" width="22" height="22" fill="none" stroke="#333333"/>
    <text x="357" y="29" font-family="JetBrains Mono, Consolas, monospace" font-size="11" fill="#888888" text-anchor="middle">✕</text>
  </g>

  <g transform="translate(8 100)">
    <rect width="380" height="78" fill="#0d0d0d" stroke="#333333"/>
    <rect width="240" height="2" fill="#ff0000"/>
    <rect width="380" height="78" fill="url(#dots)" opacity="0.5"/>

    <rect x="13" y="15" width="34" height="34" fill="#000000" stroke="#333333"/>
    <text x="30" y="38" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">◇</text>

    <text x="60" y="42" font-family="JetBrains Mono, Consolas, monospace" font-size="28" font-weight="600"
          fill="#ff0000">10s</text>
    <text x="118" y="42" font-family="JetBrains Mono, Consolas, monospace" font-size="10" fill="#888888"
          letter-spacing="2">→ WATER</text>

    <rect x="346" y="13" width="22" height="22" fill="none" stroke="#333333"/>
    <text x="357" y="29" font-family="JetBrains Mono, Consolas, monospace" font-size="11" fill="#888888" text-anchor="middle">✕</text>
  </g>
</svg>