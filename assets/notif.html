<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:        #000000;
    --surface:   #0d0d0d;
    --border:    #333333;
    --fg:        #ffffff;
    --fg-dim:    #888888;
    --accent:    #ff0000;
    --mono: 'JetBrains Mono', 'SF Mono', 'Consolas', 'Courier New', monospace;
  }

  html, body {
    background: transparent;
    overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
    color: var(--fg);
  }

  #root {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 8px;
  }

  /* ── Card ── */
  .card {
    width: 380px;
    background: var(--surface);
    background-image: radial-gradient(circle, #1f1f1f 1px, transparent 1px);
    background-size: 12px 12px;
    border: 1px solid var(--border);
    box-shadow:
      0 0  0  1px rgba(255,255,255,0.02),
      0 8px 24px rgba(0,0,0,0.65);
    padding: 13px 14px;
    display: flex;
    align-items: flex-start;
    gap: 11px;
    position: relative;
    overflow: hidden;
  }

  .card.new {
    animation: spring-in 0.42s cubic-bezier(0.22, 1.4, 0.36, 1) both;
  }

  @keyframes spring-in {
    0%   { transform: translateX(52px) scale(0.92); opacity: 0; filter: blur(2px); }
    55%  { transform: translateX(-4px) scale(1.02); opacity: 1; filter: blur(0);   }
    75%  { transform: translateX(2px)  scale(0.99); }
    100% { transform: translateX(0)    scale(1);    opacity: 1; }
  }

  .card.out {
    animation: slide-out 0.22s cubic-bezier(0.4, 0, 1, 1) forwards;
  }

  @keyframes slide-out {
    0%   { transform: translateX(0)    scale(1);    opacity: 1; max-height: 100px; }
    100% { transform: translateX(52px) scale(0.92); opacity: 0; max-height: 0;     }
  }

  /* Progress bar */
  .progress-bar {
    position: absolute;
    top: 0; left: 0;
    height: 2px;
    width: 100%;
    background: var(--accent);
    transition: width 0.95s linear;
  }

  /* Icon */
  .icon-wrap {
    width: 34px;
    height: 34px;
    border: 1px solid var(--border);
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
    color: var(--fg);
  }

  /* Body */
  .body { flex: 1; min-width: 0; }

  .title {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--fg);
    line-height: 1.3;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  .desc {
    font-size: 12px;
    color: var(--fg-dim);
    margin-top: 4px;
    line-height: 1.45;
    font-weight: 300;
  }

  /* Countdown */
  .countdown-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .countdown-num {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 600;
    line-height: 1;
    display: inline-block;
    color: var(--accent);
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
  }

  .countdown-num.tick {
    animation: tick-pop 0.18s cubic-bezier(0.34, 1.6, 0.64, 1);
  }

  @keyframes tick-pop {
    0%   { transform: scale(1.20); }
    100% { transform: scale(1);    }
  }

  .countdown-lbl {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--fg-dim);
    font-weight: 400;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  /* Close button */
  .close-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--fg-dim);
    font-size: 11px;
    cursor: pointer;
    padding: 0;
    width: 22px;
    height: 22px;
    line-height: 1;
    flex-shrink: 0;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
    margin-top: -1px;
    font-family: var(--mono);
  }

  .close-btn:hover {
    color: var(--bg);
    background: var(--fg);
    border-color: var(--fg);
  }
</style>
</head>
<body>
<div id="root"></div>
<script>
  const CARD_H  = 78;
  const GAP     = 8;
  const PADDING = 16;
  const COUNTDOWN_MAX = 15;

  const notifs = {};

  function computeHeight() {
    const n = Object.keys(notifs).length;
    if (n === 0) return 0;
    return n * CARD_H + (n - 1) * GAP + PADDING;
  }

  function renderAll(animateKey) {
    const root = document.getElementById('root');
    root.querySelectorAll('.card').forEach(el => {
      if (!notifs[el.dataset.key]) el.remove();
    });
    Object.keys(notifs).forEach(key => {
      if (root.querySelector(`[data-key="${key}"]`)) return;
      root.appendChild(buildCard(key, notifs[key], key === animateKey));
    });
    window.notifAPI.resize(computeHeight());
  }

  function buildCard(key, data, animate) {
    const card = document.createElement('div');
    card.className = 'card' + (animate ? ' new' : '');
    card.dataset.key = key;
    if (data.borderColor) card.style.borderColor = data.borderColor;
    if (data.bgColor)     card.style.background  = data.bgColor;

    // Progress bar
    const bar = document.createElement('div');
    bar.className = 'progress-bar';
    if (data.color) bar.style.background = data.color;
    if (data.countdown !== undefined) {
      bar.style.transition = 'none';
      bar.style.width = (data.countdown / COUNTDOWN_MAX * 100) + '%';
      requestAnimationFrame(() => {
        bar.style.transition = 'width 0.95s linear';
      });
    }
    card.appendChild(bar);

    // Icon
    const iconWrap = document.createElement('div');
    iconWrap.className = 'icon-wrap';
    if (data.borderColor) iconWrap.style.borderColor = data.borderColor;
    iconWrap.textContent = data.icon || '◉';
    card.appendChild(iconWrap);

    // Body
    const body = document.createElement('div');
    body.className = 'body';
    renderBody(body, data);
    card.appendChild(body);

    // Close
    const closeBtn = document.createElement('button');
    closeBtn.className = 'close-btn';
    closeBtn.innerHTML = '&#x2715;';
    closeBtn.onclick = () => dismissCard(key, card);
    card.appendChild(closeBtn);

    return card;
  }

  function dismissCard(key, cardEl) {
    delete notifs[key];
    cardEl.classList.remove('new');
    cardEl.classList.add('out');
    cardEl.addEventListener('animationend', () => {
      cardEl.remove();
      window.notifAPI.resize(computeHeight());
    }, { once: true });
  }

  function renderBody(body, data) {
    body.innerHTML = '';
    if (data.countdown !== undefined) {
      const row = document.createElement('div');
      row.className = 'countdown-row';
      const num = document.createElement('span');
      num.className = 'countdown-num';
      if (data.color) num.style.color = data.color;
      num.textContent = data.countdown + 's';
      const lbl = document.createElement('span');
      lbl.className = 'countdown-lbl';
      lbl.textContent = '→ ' + (data.label || 'break');
      row.appendChild(num);
      row.appendChild(lbl);
      body.appendChild(row);
    } else {
      const title = document.createElement('div');
      title.className = 'title';
      title.textContent = data.title || '';
      body.appendChild(title);
      if (data.description) {
        const desc = document.createElement('div');
        desc.className = 'desc';
        desc.textContent = data.description;
        body.appendChild(desc);
      }
    }
  }

  // ── IPC listeners ──────────────────────────────────────────────────────────

  window.notifAPI.onNotif((data) => {
    const isNew = !notifs[data.key];
    notifs[data.key] = data;

    if (!isNew && data.countdown !== undefined) {
      const cardEl = document.querySelector(`[data-key="${data.key}"]`);
      if (cardEl) {
        const numEl = cardEl.querySelector('.countdown-num');
        if (numEl) {
          numEl.textContent = data.countdown + 's';
          numEl.classList.remove('tick');
          void numEl.offsetWidth;
          numEl.classList.add('tick');
        }
        const bar = cardEl.querySelector('.progress-bar');
        if (bar) bar.style.width = (data.countdown / COUNTDOWN_MAX * 100) + '%';
        return;
      }
    }

    renderAll(isNew ? data.key : null);
  });

  window.notifAPI.onDismiss((key) => {
    const card = document.querySelector(`[data-key="${key}"]`);
    if (card) dismissCard(key, card);
    else delete notifs[key];
  });
</script>
</body>
</html>
