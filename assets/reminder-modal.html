<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:        #1e1e1e;
    --surface:   #2a2a2a;
    --border:    #3d3d3d;
    --fg:        #ffffff;
    --fg-dim:    #999999;
    --accent:    #ff6b1a;
    --mono: 'JetBrains Mono', 'SF Mono', 'Consolas', 'Courier New', monospace;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
    color: var(--fg);
  }

  /* Full-screen overlay with dot-matrix backdrop */
  #overlay {
    width: 100%; height: 100%;
    background-color: rgba(0, 0, 0, 0.78);
    background-image: radial-gradient(circle, rgba(60,60,60,0.7) 1px, transparent 1px);
    background-size: 18px 18px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    animation: fade-in 0.25s ease forwards;
  }

  @keyframes fade-in { to { opacity: 1; } }

  /* Card — charcoal surface, sharp corners, 1px border */
  #card {
    background: var(--surface);
    background-image: radial-gradient(circle, #353535 1px, transparent 1px);
    background-size: 16px 16px;
    border: 1px solid var(--border);
    padding: 48px 52px 40px;
    width: 480px;
    text-align: center;
    box-shadow: 0 32px 80px rgba(0,0,0,0.65);
    transform: scale(0.94) translateY(16px);
    opacity: 0;
    animation: card-in 0.42s cubic-bezier(0.22, 1.4, 0.36, 1) 0.10s forwards;
    position: relative;
    overflow: hidden;
  }

  @keyframes card-in {
    to { transform: scale(1) translateY(0); opacity: 1; }
  }

  /* Progress bar (red, top of card) */
  #progress-bar {
    position: absolute;
    top: 0; left: 0;
    height: 3px;
    width: 100%;
    background: var(--accent);
    transition: width 0.95s linear;
  }

  /* Top-left tag — Nothing-style ID label */
  #tag {
    position: absolute;
    top: 18px; left: 22px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.22em;
    color: var(--fg-dim);
    text-transform: uppercase;
  }

  #tag-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--accent);
    margin-right: 6px;
    vertical-align: middle;
    animation: blink 1.5s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.25; }
  }

  /* Top-right ascii corner */
  #corner {
    position: absolute;
    top: 18px; right: 22px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.22em;
    color: var(--fg-dim);
  }

  /* Icon — transparent container, mascot sits on the card surface */
  #icon-wrap {
    width: 160px; height: 160px;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    margin: 28px auto 18px;
    color: var(--fg);
  }

  #icon-wrap img {
    width: 160px;
    height: 160px;
    object-fit: contain;
    display: block;
    animation: mascot-bounce 2.4s ease-in-out infinite;
  }

  @keyframes mascot-bounce {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-4px); }
  }

  /* Title */
  #title {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
    color: var(--fg);
    margin-bottom: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* Body */
  #body-text {
    font-size: 14px;
    color: var(--fg-dim);
    line-height: 1.65;
    margin-bottom: 36px;
    font-weight: 300;
    max-width: 360px;
    margin-left: auto;
    margin-right: auto;
  }

  /* Buttons */
  #btn-row {
    display: flex;
    gap: 12px;
    justify-content: center;
  }

  .btn {
    padding: 12px 22px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s, opacity 0.2s;
    min-width: 150px;
    background: transparent;
    border: 1px solid var(--fg);
    color: var(--fg);
  }

  .btn:hover:not(:disabled) {
    background: var(--fg);
    color: var(--bg);
  }

  #restart-btn {
    border-color: var(--accent);
    color: var(--accent);
  }

  #close-btn {
    border-color: var(--fg);
    color: var(--fg);
  }

  #close-btn:hover:not(:disabled) {
    background: var(--fg);
    color: var(--bg);
  }

  #restart-btn:hover:not(:disabled) {
    background: var(--accent);
    color: var(--fg);
  }

  #close-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    border-color: var(--border);
    color: var(--fg-dim);
  }

  /* Spinner inside close button */
  #lock-ring {
    display: inline-block;
    width: 11px; height: 11px;
    border: 1.5px solid var(--fg-dim);
    border-top-color: transparent;
    animation: spin 1s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
    margin-bottom: 1px;
  }

  #lock-ring.done { display: none; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Queue hint */
  #queue-hint {
    margin-top: 22px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--fg-dim);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    display: none;
  }
</style>
</head>
<body>
<div id="overlay">
  <div id="card">
    <div id="progress-bar"></div>
    <div id="tag"><span id="tag-dot"></span><span id="tag-label">SYS · REMINDER</span></div>
    <div id="corner">[ PAUSELY ]</div>
    <div id="icon-wrap"><img id="mascot-img" alt="" style="display:none"/><span id="icon-glyph">◉</span></div>
    <div id="title">Reminder</div>
    <div id="body-text">Time's up.</div>
    <div id="btn-row">
      <button class="btn" id="restart-btn">↺ Restart Timer</button>
      <button class="btn" id="close-btn" disabled>
        <span id="lock-ring"></span>
        <span id="close-label">Close (5)</span>
      </button>
    </div>
    <div id="queue-hint"></div>
  </div>
</div>

<script>
  let reminderType = null;
  let closeTimer   = null;
  const CLOSE_SECS = 5;

  window.modalAPI.onData((data) => {
    reminderType = data.type;

    const mascotImg  = document.getElementById('mascot-img');
    const iconGlyph  = document.getElementById('icon-glyph');
    if (data.mascot) {
      mascotImg.src             = data.mascot;
      mascotImg.style.display   = 'block';
      iconGlyph.style.display   = 'none';
    } else {
      iconGlyph.textContent     = data.icon;
      mascotImg.style.display   = 'none';
      iconGlyph.style.display   = 'inline';
    }
    document.getElementById('title').textContent      = data.title;
    document.getElementById('body-text').textContent  = data.body;
    document.getElementById('tag-label').textContent  = 'SYS · ' + (data.label ? data.label.toUpperCase() : 'REMINDER');

    // Show queue hint if more reminders are waiting
    const queueHint = document.getElementById('queue-hint');
    if (data.queueLength > 0) {
      queueHint.style.display = 'block';
      queueHint.textContent   = `+ ${data.queueLength} reminder${data.queueLength > 1 ? 's' : ''} queued`;
    }

    // Progress bar shrinks from 100% to 0% over CLOSE_SECS
    const bar        = document.getElementById('progress-bar');
    bar.style.transition   = 'none';
    bar.style.width        = '100%';

    const closeBtn   = document.getElementById('close-btn');
    const closeLabel = document.getElementById('close-label');
    const lockRing   = document.getElementById('lock-ring');

    let secs = CLOSE_SECS;
    closeLabel.textContent = `Close (${secs})`;

    requestAnimationFrame(() => {
      bar.style.transition = `width ${CLOSE_SECS}s linear`;
      bar.style.width      = '0%';
    });

    closeTimer = setInterval(() => {
      secs--;
      if (secs <= 0) {
        clearInterval(closeTimer);
        closeBtn.disabled      = false;
        closeLabel.textContent = 'Close';
        lockRing.classList.add('done');
      } else {
        closeLabel.textContent = `Close (${secs})`;
      }
    }, 1000);
  });

  document.getElementById('restart-btn').onclick = () => {
    clearInterval(closeTimer);
    window.modalAPI.restart(reminderType);
  };

  document.getElementById('close-btn').onclick = () => {
    clearInterval(closeTimer);
    window.modalAPI.close();
  };
</script>
</body>
</html>
